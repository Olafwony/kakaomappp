<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 맛집 탐색 서비스</title>
    <style>
        /* 기본 레이아웃 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; }
        
        .container { display: flex; width: 100%; height: 100vh; }

        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 350px; height: 100%; padding: 20px;
            background-color: #ffffff; border-right: 1px solid #ddd;
            z-index: 10; overflow-y: auto;
        }

        .search-box { margin-bottom: 20px; position: sticky; top: 0; background: white; padding-bottom: 10px; }
        .search-box h2 { margin-bottom: 15px; font-size: 1.2rem; color: #333; }
        
        input[type="text"] {
            width: 100%; padding: 12px; border: 2px solid #fee500;
            border-radius: 8px; outline: none; margin-bottom: 8px;
        }

        button {
            width: 100%; padding: 12px; background-color: #fee500;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background-color: #fada00; }

        /* 결과 리스트 스타일 */
        #result-list { list-style: none; }
        .place-item {
            padding: 15px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; transition: background 0.2s;
        }
        .place-item:hover { background-color: #f9f9f9; }
        .place-name { font-weight: bold; color: #e67e22; display: block; margin-bottom: 5px; }
        .place-phone { font-size: 0.85rem; color: #888; }

        /* 오른쪽 지도 영역 */
        .map-area { flex: 1; height: 100%; }

        /* 커스텀 오버레이(팝업) 스타일 */
        .customoverlay {
            position: relative; bottom: 50px; border-radius: 6px; border: 1px solid #ccc;
            border-bottom: 2px solid #ddd; float: left; background: #fff; padding: 10px;
        }
        .customoverlay .title { font-weight: bold; font-size: 14px; margin-bottom: 3px; }
        .customoverlay .address { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="search-box">
            <h2>🍕 맛집 탐색기</h2>
            <input type="text" id="keyword" placeholder="예: 강남역 맛집" onkeypress="if(event.keyCode==13) searchPlaces()">
            <button onclick="searchPlaces()">맛집 검색</button>
        </div>
        <ul id="result-list">
            </ul>
    </div>
    <div id="map" class="map-area"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=a57fd436b996188a0d3aea85d12499a1&libraries=services"></script>

<script>
    let map;
    let placeService;
    let markers = [];
    let infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    // 지도 초기화
    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567),
            level: 3
        };
        map = new kakao.maps.Map(container, options);
        placeService = new kakao.maps.services.Places();
        
        getCurrentLocation(); // 시작 시 현재 위치로 이동
    }

    // 현재 위치 가져오기
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                map.setCenter(new kakao.maps.LatLng(lat, lon));
            });
        }
    }

    // 장소 검색 실행
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.trim()) {
            alert('검색어를 입력해주세요!');
            return;
        }

        // 기존 마커 및 리스트 초기화
        removeMarkers();
        document.getElementById('result-list').innerHTML = '';
        infoWindow.close();

        // 키워드로 장소 검색 요청
        placeService.keywordSearch(keyword, searchCallback);
    }

    // 검색 결과 콜백
    function searchCallback(data, status) {
        if (status === kakao.maps.services.Status.OK) {
            displayResults(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다.');
        } else {
            alert('검색 중 오류가 발생했습니다.');
        }
    }

    // 결과 표시 (마커 + 리스트)
    function displayResults(places) {
        const listContainer = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();

        places.forEach((place) => {
            const position = new kakao.maps.LatLng(place.y, place.x);
            
            // 1. 지도에 이모지 마커 표시
            const marker = createEmojiMarker(position, place);
            markers.push(marker);

            // 2. 왼쪽 리스트 아이템 생성
            const item = document.createElement('li');
            item.className = 'place-item';
            item.innerHTML = `
                <span class="place-name">${place.place_name}</span>
                <span class="place-phone">${place.phone || '전화번호 없음'}</span>
            `;
            
            // 리스트 클릭 시 해당 마커로 이동 및 팝업
            item.onclick = () => {
                map.panTo(position);
                showInfoWindow(marker, place);
            };

            listContainer.appendChild(item);
            bounds.extend(position);
        });

        map.setBounds(bounds); // 모든 결과가 보이도록 지도 범위 조정
    }

    // 이모지 커스텀 마커 생성
    function createEmojiMarker(position, place) {
        const content = `<div style="font-size: 30px; cursor: pointer;">🍕</div>`;
        
        const customMarker = new kakao.maps.CustomOverlay({
            position: position,
            content: content,
            yAnchor: 1
        });

        customMarker.setMap(map);

        // 이모지 클릭 이벤트 (마커 클릭 시 팝업)
        // CustomOverlay는 직접 이벤트를 지원하지 않으므로 content 내부 엘리먼트에 직접 부여하거나
        // 투명한 기본 마커를 겹쳐서 사용합니다. 여기서는 간단하게 InfoWindow를 연결합니다.
        
        // 클릭 시 정보를 보여주기 위해 클릭 가능한 투명 마커를 하나 더 생성합니다.
        const marker = new kakao.maps.Marker({
            position: position,
            opacity: 0 // 보이지 않게 설정
        });
        marker.setMap(map);
        
        kakao.maps.event.addListener(marker, 'click', function() {
            showInfoWindow(marker, place);
        });

        return marker;
    }

    // 정보창(팝업) 표시
    function showInfoWindow(marker, place) {
        const content = `
            <div style="padding:10px; min-width:150px;">
                <div style="font-weight:bold; margin-bottom:5px;">${place.place_name}</div>
                <div style="font-size:12px; color:#666;">${place.road_address_name || place.address_name}</div>
            </div>
        `;
        infoWindow.setContent(content);
        infoWindow.open(map, marker);
    }

    // 기존 마커 제거
    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        // 이모지 오버레이도 함께 제거하기 위해 페이지 내 모든 커스텀 오버레이 초기화 로직이 필요할 수 있으나, 
        // 여기선 간단하게 구현하기 위해 마커 배열을 관리합니다.
        const overlays = document.querySelectorAll('.customoverlay');
        overlays.forEach(o => o.remove());
    }

    window.onload = initMap;
</script>

</body>
</html>
