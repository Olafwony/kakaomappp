<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 여백 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 화면을 왼쪽과 오른쪽으로 분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* 왼쪽 사이드바: 검색 및 결과 리스트 */
        .sidebar {
            width: 350px;
            height: 100%;
            padding: 20px;
            background-color: #f8f9fa;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 10;
            overflow-y: auto;
        }

        /* 오른쪽: 지도 영역 */
        .map-area {
            flex: 1; /* 남은 공간을 모두 차지 */
            height: 100%;
        }

        .search-box {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #fee500; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #result-list {
            list-style: none;
        }

        .item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="search-box">
            <h2>장소 검색</h2>
            <input type="text" id="keyword" placeholder="검색어를 입력하세요">
            <button onclick="searchPlaces()">검색하기</button>
        </div>
        <ul id="result-list">
            </ul>
    </div>

    <div id="map" class="map-area"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=a57fd436b996188a0d3aea85d12499a1&libraries=services"></script>

<script>
    // 전역 변수 설정
    let map;
    let placeService;
    let markers = [];

    // 1. 지도 초기화 함수
    function initMap() {
        const mapContainer = document.getElementById('map'); 
        const mapOptions = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 허용 전 기본 중심 (서울시청)
            level: 5 // 요청한 지도 확대 레벨
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOptions);

        // 장소 검색 서비스 객체 생성
        placeService = new kakao.maps.services.Places();

        // 지도가 로드된 후 현재 위치를 가져오는 함수 실행
        getCurrentLocation();
    }

    // 2. 현재 위치 권한을 받아 지도의 중심을 옮기는 함수
    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; // 위도
                const lon = position.coords.longitude; // 경도
                
                const locPosition = new kakao.maps.LatLng(lat, lon);
                
                // 지도 중심을 내 위치로 이동
                map.setCenter(locPosition);
                
                // 내 위치에 마커 하나 찍어주기
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: locPosition
                });
            }, function(error) {
                console.error("위치 권한을 획득하지 못했습니다.");
            });
        }
    }

    // 3. 키워드로 장소를 검색하는 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return false;
        }

        // 카카오 API로 장소 검색 요청
        placeService.keywordSearch(keyword, placesSearchCB);
    }

    // 4. 검색 결과가 돌아왔을 때 실행되는 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 5. 검색 결과를 왼쪽 리스트와 지도 마커로 표시하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('result-list');
        const bounds = new kakao.maps.LatLngBounds();
        
        // 이전 검색 결과 지우기
        listEl.innerHTML = '';
        removeMarkers();

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const marker = addMarker(placePosition);
            const itemEl = document.createElement('li');
            
            itemEl.className = 'item';
            itemEl.innerHTML = `<strong>${places[i].place_name}</strong><br><small>${places[i].address_name}</small>`;
            
            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        // 검색된 장소들이 다 보이도록 지도 범위 조정
        map.setBounds(bounds);
    }

    // 마커 추가 함수
    function addMarker(position) {
        const marker = new kakao.maps.Marker({
            position: position,
            map: map
        });
        markers.push(marker);
        return marker;
    }

    // 기존 마커 제거 함수
    function removeMarkers() {
        for (let i = 0; i < markers.length; i++) {
            markers[i].setMap(null);
        }
        markers = [];
    }

    // 페이지가 로드되자마자 지도 생성 시작
    window.onload = initMap;
</script>

</body>
</html>
